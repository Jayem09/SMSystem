<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SMSystem – Centralized Management System" />
    <title>SMSystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      console.log('[INDEX] SMSystem loading...');
      window.addEventListener('error', function(e) {
        console.log('[INDEX] Error:', e.message);
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.log('[INDEX] Unhandled rejection:', e.reason);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
        body { 
          background: linear-gradient(135deg, #111827 0%, #1f2937 50%, #111827 100%); 
          display: flex; 
          flex-direction: column;
          align-items: center; 
          justify-content: center; 
          height: 100vh; 
          margin: 0; 
          font-family: 'Inter', sans-serif;
        }
        .brand {
          font-size: 2rem;
          font-weight: 700;
          color: #f9fafb;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          opacity: 0;
          animation: fadeUp 0.6s ease-out 0.2s forwards;
        }
        .loader {
          width: 48px;
          height: 48px;
          margin-top: 1.5rem;
          display: flex;
          gap: 6px;
        }
        .dot {
          width: 10px;
          height: 10px;
          background: #3b82f6;
          border-radius: 50%;
          animation: bounce 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
        .dot:nth-child(3) { animation-delay: 0.4s; background: #ec4899; }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
          0%, 80%, 100% { transform: scale(0.8); }
          40% { transform: scale(1.4); }
        }
      </style>
      <div class="brand">SMSystem</div>
      <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
